name: navidrome_client
description: "a client for navidrome server for android platform."
publish_to: "none"
version: 2.0.0+22

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter
  m3e_collection: ^0.3.7
  dynamic_color: ^1.8.1
  flutter_secure_storage: ^10.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
    - CHANGELOG.md
flutter_launcher_icons:
  android: true
  image_path: "assets/branding/icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/branding/foreground_layer_colored.png"
  adaptive_icon_monochrome: "assets/branding/transparent_icon.png"
